<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: #f5f4f0;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        border: 0.5px solid #e5e5e5;
      }
      .header {
        background: #a32d2d;
        padding: 32px;
        text-align: center;
      }
      .logo {
        font-size: 24px;
        font-weight: 700;
        color: #fff;
      }
      .body {
        padding: 32px;
      }
      .title {
        font-size: 22px;
        font-weight: 600;
        color: #26215c;
        margin-bottom: 12px;
      }
      .text {
        font-size: 14px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 16px;
      }
      .info-box {
        background: #fcebeb;
        border: 0.5px solid #f09595;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .info-label {
        font-size: 11px;
        color: #a32d2d;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .info-value {
        font-size: 14px;
        color: #333;
        font-weight: 500;
      }
      .button {
        display: inline-block;
        background: #a32d2d;
        color: #fff;
        padding: 12px 28px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
      }
      .footer {
        background: #f5f4f0;
        padding: 20px 32px;
        text-align: center;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🚩 New Listing Report</div>
      </div>
      <div class="body">
        <h1 class="title">A listing has been reported</h1>
        <div class="info-box">
          <div class="info-label">Listing</div>
          <div class="info-value">{{ listing_title }}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Reason</div>
          <div class="info-value">{{ reason }}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Details</div>
          <div class="info-value">{{ details }}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Reported by</div>
          <div class="info-value">{{ reported_by }}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Listing owner</div>
          <div class="info-value">{{ listing_owner }}</div>
        </div>
        <a href="{{ admin_url }}" class="button">Review in Admin →</a>
      </div>
      <div class="footer">© 2026 NepSaathi · नेपसाथी</div>
    </div>
  </body>
</html>
